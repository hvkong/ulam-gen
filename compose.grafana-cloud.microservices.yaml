x-quickfood-env-common: &quickfood-env-common
  QUICKFOOD_OTLP_ENDPOINT: http://alloy:4318
  QUICKFOOD_TRUST_CLIENT_TRACEID: true
  QUICKFOOD_ENABLE_ALL_SERVICES: 0 # 0 for microservice mode
  QUICKFOOD_CATALOG_ENDPOINT: http://catalog:3333
  QUICKFOOD_COPY_ENDPOINT: http://copy:3333
  QUICKFOOD_WS_ENDPOINT: http://ws:3333
  QUICKFOOD_RECOMMENDATIONS_ENDPOINT: http://recommendations:3333
  QUICKFOOD_CONFIG_ENDPOINT: http://config:3333
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=${DEPLOYMENT_ENVIRONMENT:-development},service.version=quickfood-local"

name: quickfood
services:
  alloy:
    image: grafana/alloy:v1.12.2@sha256:f94b1c82957accb77cd11385fd5e3600758ef1b1ab79557c97319ad28590735a
    container_name: alloy
    labels:
      - "service.type=instrumentation"
    volumes:
      - "./deployments/docker-compose/grafana-cloud/${ALLOY_FILE_NAME:-config.alloy}:/config.alloy:Z"
      - "${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock"
    command:
      - run
      - /config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=public-preview
    ports:
      - "12345:12345"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      QUICKFOOD_HOST: public-api:3333
      # must be set with an .env file
      GRAFANA_CLOUD_TOKEN: "${GRAFANA_CLOUD_TOKEN}"
      GRAFANA_CLOUD_STACK: "${GRAFANA_CLOUD_STACK}"
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-development}
      # Use empty string to disable.
      DB_O11Y_CONNECTION: "${DB_O11Y_CONNECTION-postgres://db-o11y:db-o11y-password@quickfood-db:5432/quickfood_db?sslmode=disable}"
      SERVICE_NAMESPACE: "${SERVICE_NAMESPACE:-quickfood}"
      DB_SERVICE_NAME: "quickfood-db"
    depends_on:
      - catalog
      - config
      - copy
      - public-api
      - recommendations
      - ws
      - grpc

  catalog:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: catalog
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_CATALOG_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "catalog"
      QUICKFOOD_OTEL_SERVICE_NAME: "catalog"
      # QUICKFOOD_DB unset set to postgres. If empty, set to sqlite.
      QUICKFOOD_DB: "${QUICKFOOD_DB-postgres://postgres:postgres@quickfood-db:5432/quickfood_db?sslmode=disable}"
      # OTEL `db.name` span attribute. Used by servicegraph to create service nodes with this name
      # Set to the logical database service name
      QUICKFOOD_OTEL_DB_NAME: "quickfood-db"
    depends_on:
      quickfood-db:
        condition: service_healthy

  config:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: config
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_CONFIG_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "config"
      QUICKFOOD_OTEL_SERVICE_NAME: "config"
      # enable Faro integration
      QUICKFOOD_CONF_FARO_URL: "${QUICKFOOD_CONF_FARO_URL:-}"
      QUICKFOOD_CONF_FARO_APP_NAME: "${QUICKFOOD_CONF_FARO_APP_NAME:-QuickFood}"
      QUICKFOOD_CONF_FARO_INSTRUMENTATION_ENABLE_REPLAY: "${QUICKFOOD_CONF_FARO_INSTRUMENTATION_ENABLE_REPLAY:-false}"
  copy:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: copy
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_COPY_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "copy"
      QUICKFOOD_OTEL_SERVICE_NAME: "copy"
      # QUICKFOOD_DB unset set to postgres. If empty, set to sqlite.
      QUICKFOOD_DB: "${QUICKFOOD_DB-postgres://postgres:postgres@quickfood-db:5432/quickfood_db?sslmode=disable}"
      # OTEL `db.name` span attribute. Used by servicegraph to create service nodes with this name
      # Set to the logical database service name
      QUICKFOOD_OTEL_DB_NAME: "quickfood-db"
    depends_on:
      quickfood-db:
        condition: service_healthy
      catalog: # avoid race condition for db migrations
        condition: service_started

  public-api:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: public-api
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    ports:
      - "3333:3333"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_PUBLIC_API_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "public-api"
      QUICKFOOD_OTEL_SERVICE_NAME: "public-api"

  recommendations:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: recommendations
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_RECOMMENDATIONS_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "recommendations"
      QUICKFOOD_OTEL_SERVICE_NAME: "recommendations"

  ws:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: ws
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_WS_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "ws"
      QUICKFOOD_OTEL_SERVICE_NAME: "ws"

  grpc:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: grpc
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    ports:
      - "3334:3334"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_GRPC_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "grpc"
      QUICKFOOD_OTEL_SERVICE_NAME: "grpc"

  quickfood-db:
    image: postgres:18.1@sha256:5773fe724c49c42a7a9ca70202e11e1dff21fb7235b335a73f39297d200b73a2
    container_name: quickfood-db
    labels:
      - "service.type=database"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickfood_db
      DB_O11Y_USER: db-o11y
      DB_O11Y_PASSWORD: db-o11y-password
      DB_O11Y_DATABASES: quickfood_db
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./deployments/init-db-observability.sh:/docker-entrypoint-initdb.d/init-db-observability.sh:Z
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "track_activity_query_size=4096"
      - "-c"
      - "pg_stat_statements.track=all"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
