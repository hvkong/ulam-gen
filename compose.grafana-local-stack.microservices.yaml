x-quickfood-env-common: &quickfood-env-common
  QUICKFOOD_OTLP_ENDPOINT: http://alloy:4318
  QUICKFOOD_TRUST_CLIENT_TRACEID: true
  QUICKFOOD_ENABLE_ALL_SERVICES: 0 # 0 for microservice mode
  QUICKFOOD_CATALOG_ENDPOINT: http://catalog:3333
  QUICKFOOD_COPY_ENDPOINT: http://copy:3333
  QUICKFOOD_WS_ENDPOINT: http://ws:3333
  QUICKFOOD_RECOMMENDATIONS_ENDPOINT: http://recommendations:3333
  QUICKFOOD_CONFIG_ENDPOINT: http://config:3333
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=${DEPLOYMENT_ENVIRONMENT:-development},service.version=quickfood-local"

name: quickfood
services:
  alloy:
    image: grafana/alloy:v1.12.2@sha256:f94b1c82957accb77cd11385fd5e3600758ef1b1ab79557c97319ad28590735a
    container_name: alloy
    labels:
      - "service.type=instrumentation"
    volumes:
      - "./deployments/docker-compose/grafana-local-stack/${ALLOY_FILE_NAME:-config.alloy}:/config.alloy:Z"
      - "${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock"
    command:
      - run
      - /config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=public-preview
    ports:
      - "12345:12345"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    environment:
      QUICKFOOD_HOST: quickfood:3333
      METRICS_ENDPOINT: http://prometheus:9090/api/v1/write
      TRACES_ENDPOINT: http://tempo:4317
      LOGS_ENDPOINT: http://loki:3100/loki/api/v1/push
      PROFILES_ENDPOINT: http://pyroscope:4040
      DEPLOYMENT_ENVIRONMENT: ${DEPLOYMENT_ENVIRONMENT:-development}
      # Default uses the same DB connection as the Quickfood service. Use empty string to disable.
      DB_O11Y_CONNECTION: "${DB_O11Y_CONNECTION-postgres://postgres:postgres@quickfood-db:5432/quickfood_db?sslmode=disable}"
      SERVICE_NAMESPACE: "${SERVICE_NAMESPACE:-quickfood}"
      DB_SERVICE_NAME: "quickfood-db"
    depends_on:
      - prometheus
      - tempo
      - pyroscope
      - catalog
      - config
      - copy
      - public-api
      - recommendations
      - ws
      - grpc

  catalog:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: catalog
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_CATALOG_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "catalog"
      QUICKFOOD_OTEL_SERVICE_NAME: "catalog"
      # QUICKFOOD_DB unset set to postgres. If empty, set to sqlite.
      QUICKFOOD_DB: "${QUICKFOOD_DB-postgres://postgres:postgres@quickfood-db:5432/quickfood_db?sslmode=disable}"
    depends_on:
      quickfood-db:
        condition: service_healthy

  config:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: config
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_CONFIG_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "config"
      QUICKFOOD_OTEL_SERVICE_NAME: "config"
  copy:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: copy
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_COPY_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "copy"
      QUICKFOOD_OTEL_SERVICE_NAME: "copy"
      # QUICKFOOD_DB unset set to postgres. If empty, set to sqlite.
      QUICKFOOD_DB: "${QUICKFOOD_DB-postgres://postgres:postgres@quickfood-db:5432/quickfood_db?sslmode=disable}"
    depends_on:
      quickfood-db:
        condition: service_healthy
      catalog:
        condition: service_started

  public-api:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: public-api
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    ports:
      - "3333:3333"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_PUBLIC_API_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "public-api"
      QUICKFOOD_OTEL_SERVICE_NAME: "public-api"

  recommendations:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: recommendations
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_RECOMMENDATIONS_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "recommendations"
      QUICKFOOD_OTEL_SERVICE_NAME: "recommendations"

  ws:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.21@sha256:de839571c65ce9ac6e96290f44a7122869f31744d93bd235903ecb9429158d32}
    container_name: ws
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_WS_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "ws"
      QUICKFOOD_OTEL_SERVICE_NAME: "ws"

  grpc:
    image: ${QUICKFOOD_IMAGE:-ghcr.io/grafana/quickfood-local:0.15.19@sha256:9bb274e6178bfccc8da2f7d28dd65285fd6f6f8fd9d006febec65c7da655cfde}
    container_name: grpc
    labels:
      - "service.type=application"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    ports:
      - "3334:3334"
      - "3335:3335"
    environment:
      <<: *quickfood-env-common
      QUICKFOOD_ENABLE_GRPC_SERVICE: "1"
      QUICKFOOD_OTEL_SERVICE_INSTANCE_ID: "grpc"
      QUICKFOOD_OTEL_SERVICE_NAME: "grpc"

  quickfood-db:
    image: postgres:18.1@sha256:5773fe724c49c42a7a9ca70202e11e1dff21fb7235b335a73f39297d200b73a2
    container_name: quickfood-db
    labels:
      - "service.type=database"
      - "service.namespace=${SERVICE_NAMESPACE:-quickfood}"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quickfood_db
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.4.3@sha256:5fe9fa99e9a747297cdf0239a5b25d192d8f668bd6505b09beef4dffcab5aac2
    container_name: loki
    labels:
      - "service.type=instrumentation"
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.9.1@sha256:1f0f50f06acaceb0f5670d2c8a658a599affe7b0d8e78b898c1035653849a702
    container_name: prometheus
    labels:
      - "service.type=instrumentation"
    volumes:
      - ./deployments/docker-compose/grafana-local-stack/prometheus.yaml:/etc/prometheus.yaml
    command:
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --config.file=/etc/prometheus.yaml
    ports:
      - "9090:9090"

  pyroscope:
    image: grafana/pyroscope:1.16.0@sha256:58e49fa3443195c7b95f5c9821ce8920a8627f215c2ccdf955a9cd78c76a3468
    container_name: pyroscope
    labels:
      - "service.type=instrumentation"
    ports:
      - "4040:4040"

  tempo:
    image: grafana/tempo:2.9.0@sha256:65a5789759435f1ef696f1953258b9bbdb18eb571d5ce711ff812d2e128288a4
    container_name: tempo
    labels:
      - "service.type=instrumentation"
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deployments/docker-compose/grafana-local-stack/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200" # Tempo API/UI
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-12.2.0}
    container_name: grafana
    labels:
      - "service.type=instrumentation"
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=tempoAlerting
    volumes:
      - ./deployments/docker-compose/grafana-local-stack/grafana:/etc/grafana/provisioning/

volumes:
  postgres_data:
