---
apiVersion: v1
kind: Secret
metadata:
  name: quickfood-db-credentials
type: Opaque
stringData:
  DATABASE_PASSWORD: quickfood
  CONNECTION_STRING: postgres://quickfood:quickfood@quickfood-db/quickfood_db?sslmode=disable

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quickfood-db
  labels:
    environment: production
    app.k8s.io/name: quickfood
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: quickfood-db
spec:
  replicas: 1
  serviceName: quickfood-db
  selector:
    matchLabels:
      environment: production
      app.k8s.io/name: quickfood
      app.kubernetes.io/component: database
      app.kubernetes.io/instance: quickfood-db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  template:
    metadata:
      labels:
        environment: production
        app.k8s.io/name: quickfood
        app.kubernetes.io/component: database
        app.kubernetes.io/instance: quickfood-db
    spec:
      containers:
        - name: postgres
          image: postgres:18
          ports:
            - containerPort: 5432
              name: psql
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quickfood-db-credentials
                  key: DATABASE_PASSWORD
            - name: POSTGRES_DB
              value: quickfood
            - name: POSTGRES_USER
              value: quickfood
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql

---
apiVersion: v1
kind: Service
metadata:
  name: quickfood-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: psql
  selector:
    environment: production
    app.k8s.io/name: quickfood
    app.kubernetes.io/component: database
    app.kubernetes.io/instance: quickfood-db
