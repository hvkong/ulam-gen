# Uncomment the following line to deploy the application on a non-default namespace
# namespace: quickfood

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - database.yaml
  - catalog.yaml
  - config.yaml
  - copy.yaml
  - grpc.yaml
  - public-api.yaml
  - recommendations.yaml
  - ws.yaml

configMapGenerator:
  - name: quickfood-env-common
    literals:
      # Trust all incoming TraceIDs for demo purposes
      - QUICKFOOD_TRUST_CLIENT_TRACEID=true
        # Microservice mode: Set to 0 to run services in separate pods
      - QUICKFOOD_ENABLE_ALL_SERVICES=0
      - QUICKFOOD_CATALOG_ENDPOINT=http://quickfood-catalog:3333
      - QUICKFOOD_COPY_ENDPOINT=http://quickfood-copy:3333
      - QUICKFOOD_WS_ENDPOINT=http://quickfood-ws:3333
      - QUICKFOOD_RECOMMENDATIONS_ENDPOINT=http://quickfood-recommendations:3333
      - QUICKFOOD_CONFIG_ENDPOINT=http://quickfood-config:3333
      - QUICKFOOD_OTEL_DB_NAME=quickfood-db

# defines shared properties for all deployments
patches:
  # Common settings for all deployments
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: QUICKFOOD_DB
          valueFrom:
            secretKeyRef:
              name: quickfood-db-credentials
              key: CONNECTION_STRING
    target:
      kind: Deployment
  # HTTP probes for all deployments except gRPC (which defines its own probes)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /ready
            port: 3333
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /healthz
            port: 3333
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
    target:
      kind: Deployment
      name: "!quickfood-grpc"
