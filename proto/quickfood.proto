syntax = "proto3";
option go_package = "pkg/grpc/quickfood";
package quickfood;

service GRPC {
    rpc Status(StatusRequest) returns (StatusResponse) {}
    rpc RateFood(FoodRatingRequest) returns (FoodRatingResponse) {}
}

message StatusRequest {
}

message StatusResponse {
    bool ready = 1;
}

message FoodRatingRequest {
    repeated string ingredients = 1;
    string dough = 2;
}

message FoodRatingResponse {
    int32 stars_rating = 1;
}
